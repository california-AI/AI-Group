<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>群成员画像系统</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="no-cache" />

        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                background: #0a0a1a;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 0 20px;
            }

            .staticrypt-form {
                background: rgba(30, 30, 60, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 40px;
                text-align: center;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(10px);
            }

            .staticrypt-lock-icon {
                font-size: 48px;
                margin-bottom: 16px;
            }

            .staticrypt-title {
                color: #e0e0e0;
                font-size: 1.5em;
                font-weight: 600;
                margin-bottom: 8px;
            }

            .staticrypt-instructions {
                margin-bottom: 24px;
            }

            .staticrypt-instructions p:last-child {
                color: #888;
                font-size: 0.875rem;
            }

            .staticrypt-hr {
                display: none;
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 10px;
                width: 100%;
                margin: 0 0 16px;
                transition: border-color 0.2s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #00d4ff;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: #e0e0e0;
                font-size: 1rem;
                outline: 0;
                padding: 14px 40px 14px 16px;
                width: 100%;
                box-sizing: border-box;
            }

            .staticrypt-form input::placeholder {
                color: #666;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 40%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(1);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: linear-gradient(135deg, #00b4d8, #00d4ff);
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 14px;
                color: #000;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: opacity 0.2s;
                text-transform: none;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                opacity: 0.9;
                filter: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                color: #888;
                font-size: 0.875rem;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 8px;
                accent-color: #00d4ff;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a1a;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(255,255,255,0.2);
                border-right-color: #00d4ff;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
